{% extends 'index.html' %}

{% block title %}<h1>{{ title }}</h1>{% endblock %}

{% block plotscript %}
<script>
    // Fetch the plot data from the Flask server and render it
    fetch('/mut_plot', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            allele_frequencies: []  // Update the key to match what the server expects
        })
    })
        .then(response => response.json())
        .then(data => {
            const plotDiv = document.getElementById('plot');
            Plotly.newPlot(plotDiv, data.data, data.layout);
        });
</script>
{% endblock %}

{% block settings %}

<label for='pop'>Population Size:</label>
<select name='pop' id='pop'>
    <option value='25'>25</option>
    <option value='100'>100</option>
    <option value='250'>250</option>
</select>
<label for='mig'>Migration Rate:</label>
<select name='mig' id='mig'>
    <option value='0'>None</option>
    <option value='0.001'>0.001</option>
    <option value='0.01'>0.01</option>
    <option value='0.1'>0.1</option>
</select>
<br>
<button onclick='startSimulation()'>Start</button>
<button onclick='clearGraph()'>Clear</button>

<script>

    function startSimulation() {
        fetch('/mig_reset', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                pop: parseInt(document.getElementById('pop').value),
                mig: parseFloat(document.getElementById('mig').value)
            })
        })
            .then(response => response.json())
            .then(data => {
                allele_frequencies = [];  // Update the key to match what the server expects

                updateSimulation();
            })
    }

    function updateSimulation() {
        fetch('/mig_next', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(data => {
                fetch('/mig_plot', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        allele_frequencies: data.pop_freqs // Update the key to match what the server expects
                    })
                })
                    .then(response => response.json())
                    .then(data => {
                        const plotDiv = document.getElementById('plot');
                        Plotly.newPlot(plotDiv, data.data, data.layout);
                    });
            });
    }

    function clearGraph() {
        fetch('/mig_clear', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
            .then(response => response.json())
            .then(data => {
                const plotDiv = document.getElementById('plot');
                Plotly.react(plotDiv, data.data, data.layout);
            });
    }

</script>

{% endblock %}
