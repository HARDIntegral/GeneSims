{% extends 'index.html' %}

{% block title %}<h1>{{ title }}</h1>{% endblock %}

{% block settings %}

<label for='gens'>Number for Generations:</label>
<input type='number' id='gens' name='gens' min='10' max='10000' value='100' required>
<br>
<label for='p'>Initial Allele Frequency (p):</label>
<input type='number' id='p' name='p' min='0' max='1' step='0.01' value='0.1' required>
<br>
<label for='w11'>Fitness for A1A1 (w11):</label>
<input type='number' id='w11' name='w11' value='1.2' min='0' max='2' step='0.1' required>
<br>
<label for='w12'>Fitness of A1A2 (w12):</label>
<input type='number' id='w12' name='w12' value='1.0' min='0' max='2' step='0.1' required>
<br>
<label for='w22'>Fitness of A2A2 (w22):</label>
<input type='number' id='w22' name='w22' value='0.8' min='0' max='2' step='0.1' required>
<br>
<label for='pop'>Population Size</label>
<input type='number' id='pop' name='pop' value='100' min='10' max='1000000' step='10' required>
<br>
<button onclick='startSimulation()'>Start</button>
<button onclick='clearGraph()'>Clear</button>

<script>
    function startSimulation() {
        fetch('sd_reset', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                gens: document.getElementById('gens').value,
                p: document.getElementById('p').value,
                w11: document.getElementById('w11').value,
                w12: document.getElementById('w12').value,
                w22: document.getElementById('w22').value,
                pop: document.getElementById('pop').value
            })
        })
        .then(response => response.json())
        .then(data => {
            freqs = [];
            gen = 0;
            updateSimulation();
        })
    }

    function updateSimulation() {
        fetch('sd_next', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            fetch('plot', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    freqs: data.freqs
                })
            })
            .then(response => response.json())
            .then(data => {
                const plotDiv = document.getElementById('plot');
                Plotly.react(plotDiv, data.data, data.layout);
            });        
        })
    }

    function clearGraph() {
        fetch('/clear', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        })
        .then(response => response.json())
        .then(data => {
            const plotDiv = document.getElementById('plot');
            Plotly.react(plotDiv, data.data, data.layout);
        });
    }

</script>

{% endblock %}
